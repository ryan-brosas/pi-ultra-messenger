name: Release

# Publishes to npm when a version tag (v*) is pushed, and can be manually
# dispatched to publish an existing tag. Auth uses an npm **Granular** access
# token stored in the NPM_TOKEN secret (granular tokens bypass 2FA, so CI
# publishes without an OTP). Provenance is signed via GitHub OIDC
# (id-token: write, below) — `--provenance` needs only that + a public repo.
#
# Required secret: NPM_TOKEN — a npm **Granular** token (Read and write,
# scoped to pi-ultra-messenger), NOT a classic "Publish" token (those require
# an OTP when 2FA is on).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.26.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On a tag push, github.ref is refs/tags/vX.Y.Z. On a manual
          # dispatch, use the provided tag input.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gate — typecheck
        run: pnpm typecheck

      - name: Build dist
        run: pnpm build

      - name: Quality gate — tests
        run: pnpm test

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
