name: Release

# Publishes to npm when a version tag (v*) is pushed, and can be manually
# dispatched to publish an existing tag. Authenticates to npm via GitHub OIDC
# (npm Trusted Publishers) — NO npm token secret required. Requires:
#   - permissions: id-token: write (below)
#   - Node 24 so the bundled npm CLI is >= 11.5.1 (trusted publishing support)
#   - the npm package Trusted Publisher configured: GitHub repo
#     ryan-brosas/pi-ultra-messenger, workflow release.yml, npm publish
# Do NOT set NODE_AUTH_TOKEN — npm exchanges the GitHub OIDC token for a
# short-lived publish token.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.26.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On a tag push, github.ref is refs/tags/vX.Y.Z. On a manual
          # dispatch, use the provided tag input.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js (Node 24 → npm 11, required for OIDC trusted publishing)
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gate — typecheck
        run: pnpm typecheck

      - name: Build dist
        run: pnpm build

      - name: Quality gate — tests
        run: pnpm test

      - name: Publish to npm
        run: npm publish --provenance --access public
