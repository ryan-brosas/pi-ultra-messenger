name: Release

# Publishes to npm when a version tag (v*) is pushed, and can be manually
# dispatched to publish an existing tag. Authenticates to npm via GitHub
# Actions OpenID Connect (Trusted Publisher) — no NPM_TOKEN secret required.
# The trust is configured on the npm package page: repo
# ryan-brosas/pi-ultra-messenger, workflow release.yml, permission npm publish.
#
# Requires workflow permission `id-token: write` (below). Do NOT set a
# NODE_AUTH_TOKEN — setup-node derives npm auth from the OIDC token when
# id-token: write is granted and no token env is provided.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.26.0)'
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # On a tag push, github.ref is refs/tags/vX.Y.Z. On a manual
          # dispatch, use the provided tag input.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Quality gate — typecheck
        run: pnpm typecheck

      - name: Build dist
        run: pnpm build

      - name: Quality gate — tests
        run: pnpm test

      - name: Publish to npm
        run: npm publish --provenance --access public
